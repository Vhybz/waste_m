name: cjt_scan
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Charts
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0
  image_picker: ^1.1.2
  provider: ^6.1.2

  # Backend - Supabase
  supabase_flutter: ^2.6.0

  # Networking
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "asset/images/img_2.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - asset/images/
